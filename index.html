<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galiweb</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="Login.css">
<link rel="stylesheet" href="Profiles.css">
<link rel="stylesheet" href="ForYou.css">
<body>
    <div id="SplashScreen">
        <h1 id="GaliwebText">Galiweb</h1>
    </div>

    <div id="ProfileScreen">
        <button id="LoginButton">Login</button>
        <label id="LoginButtonLabel"></label>
    </div>

<div class="LoginDetails">
    <input id="Email" type="email" placeholder="Email">
    <input id="Password" type="password" placeholder="Password">

    <button id="SubmitButton">Submit</button> 
</div>

<div class="MainPage">
    <div class="tab-item">
        <button id="Follow"></button>
        <label id="FollowLabel">Follow</label>
    </div>

    <div id="LevelPages">
    <h1 id="LevelOne">Level One Page</h1>

    <h1 id="LevelTwo">Level Two Page</h1>

    <h1 id="LevelThree">Level Three Page</h1>

    <h1 id="LevelFour">Level Four Page</h1>

    <h1 id="LevelFive">Level Five Page</h1>
    </div>

    <div class="tab-item">
        <button id="ForYou"></button>
        <label id="ForYouLabel">For You</label>
    </div>
</div>

<script type="module" src="main.js"></script>
<script type="module" src="keyframes.js"></script>
<script type="module" src="LogicHandler.js"></script>
<script type="module" src="Profiles.js"></script>

</body>
</html>
